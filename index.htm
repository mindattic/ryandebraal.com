// ║  INIT                                                                       ║
// ╚═══════════════════════════════════════════════════════════════════════════════╝
function init() {
  let p='classic', t='light', f="'Outfit',system-ui,sans-serif";
  try{ p=localStorage.getItem('resume-profile')||'classic'; }catch(e){}
  try{ t=localStorage.getItem('resume-theme')||'light'; }catch(e){}
  try{ f=localStorage.getItem('resume-font')||f; }catch(e){}

  document.getElementById('profile-picker').value = p;
  document.getElementById('theme-picker').value = t;
  document.getElementById('font-picker').value = f;

  render(p); currentProfile=p;
  const cb=document.getElementById('profile-cycle-btn'); if(cb) cb.innerHTML=profileLabels[p]||p;
  setFont(f);
  setTheme(t);
  initFontSize();
  initNekoColor();

  // Smart tooltip: lazily build from SKILLS on first hover, then position
  document.addEventListener('mouseenter', function(e) {
    const tagEl = e.target.closest('.tag');
    if (!tagEl) return;
    // Lazy inject tooltip on first hover
    if (!tagEl.querySelector('.tag-tooltip')) {
      const key = tagEl.dataset.skill;
      if (key && SKILLS[key]) tagEl.insertAdjacentHTML('beforeend', buildTooltip(key));
    }
    const tt = tagEl.querySelector('.tag-tooltip');
    if (!tt) return;
    const TT_W = 280, TT_H = 170, MARGIN = 10;
    const r = tagEl.getBoundingClientRect();
    const vw = window.innerWidth;
    // Reset to CSS defaults (centered above, arrow at 50%)
    tt.classList.remove('tt-below');
    tt.style.left = ''; tt.style.transform = '';
    tt.style.removeProperty('--tt-arrow-x');
    // Vertical: above by default, flip below only if not enough room above
    if (r.top < TT_H + MARGIN) tt.classList.add('tt-below');
    // Horizontal: default CSS (left:50% + translateX(-50%)) centers on tag perfectly.
    // Only override when centered tooltip would overflow the viewport edge.
    const tagCx = r.left + r.width / 2;
    const idealLeft = tagCx - TT_W / 2;
    const needsClamp = idealLeft < MARGIN || idealLeft + TT_W > vw - MARGIN;
    if (needsClamp) {
      const clampedLeft = Math.max(MARGIN, Math.min(idealLeft, vw - MARGIN - TT_W));
      const parentLeft = (tagEl.offsetParent ? tagEl.offsetParent.getBoundingClientRect().left : 0);
      tt.style.left = (clampedLeft - parentLeft) + 'px';
      tt.style.transform = 'none';
      // Arrow stays pointing at tag center regardless of tooltip shift
      tt.style.setProperty('--tt-arrow-x', (tagCx - clampedLeft) + 'px');
    }
    // Lerp-based bar fill: starts fast (big gap), decelerates to a smooth stop
    const fill = tt.querySelector('.tip-bar-fill');
    const levelEl = tt.querySelector('.tip-bar-level');
    if (fill && levelEl) {
      if (tagEl._barRaf) { cancelAnimationFrame(tagEl._barRaf); tagEl._barRaf = null; }
      const targetPct = parseFloat(fill.dataset.target || fill.style.width) || 80;
      fill.dataset.target = targetPct; // persist across re-hovers
      const ms = AppSettings.skill_bar_fill_ms || 1000;
      // lerpFactor per 60fps frame derived from desired feel-time
      // decay = -ln(0.01) / (ms/1000 * 60) ≈ 4.6 / (ms/1000*60)
      const decayPerFrame = 1 - Math.exp(-4.6 / (ms / 1000 * 60));
      const pctSpan = levelEl.querySelector('.tip-bar-pct');
      let cur = 0;
      fill.style.width = '0%';
      let lastTime = performance.now();
      function frame(now) {
        const dt60 = (now - lastTime) / (1000 / 60); // normalize to 60fps frames
        lastTime = now;
        const factor = 1 - Math.pow(1 - decayPerFrame, dt60);
        cur += (targetPct - cur) * factor;
        const done = Math.abs(targetPct - cur) < 0.05;
        if (done) cur = targetPct;
        fill.style.width = cur + '%';
        const rounded = Math.round(cur);
        const lvl = famLevel(rounded);
        if (levelEl.firstChild) levelEl.firstChild.textContent = lvl + ' ';
        if (pctSpan) pctSpan.textContent = '(' + rounded + '%)';
        if (!done) tagEl._barRaf = requestAnimationFrame(frame);
        else tagEl._barRaf = null;
      }
      tagEl._barRaf = requestAnimationFrame(frame);
    }
  }, true);

  // Cancel bar lerp when mouse leaves tag
  document.addEventListener('mouseleave', function(e) {
    const tagEl = e.target.closest('.tag');
    if (tagEl && tagEl._barRaf) { cancelAnimationFrame(tagEl._barRaf); tagEl._barRaf = null; }
  }, true);
}
init();

function openSettings() {
  const modal = document.getElementById('settings-modal');
  const body = document.getElementById('settings-body');
  body.innerHTML = SETTINGS_SCHEMA.map(({group, items}) => `
    <div>
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);border-bottom:1px solid var(--rule);padding-bottom:5px;margin-bottom:14px;">${group}</div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${items.map(s => {
          const val = AppSettings[s.key];
          const disp = s.step < 0.01 ? val.toFixed(3) : s.step < 0.1 ? val.toFixed(2) : s.step < 1 ? val.toFixed(1) : String(val);
          return `<div style="display:flex;align-items:center;gap:12px;">
            <span style="min-width:200px;font-size:12px;color:var(--text2);">${s.label}</span>
            <input type="range" min="${s.min}" max="${s.max}" step="${s.step}" value="${val}" data-key="${s.key}" data-step="${s.step}"
              style="flex:1;accent-color:var(--accent);cursor:pointer;"
              oninput="onSettingSlider(this)">
            <span id="sv-${s.key}" style="min-width:56px;text-align:right;font-size:12px;color:var(--text);font-variant-numeric:tabular-nums;">${disp}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
  modal.style.display = 'flex';
  modal.onclick = e => { if (e.target === modal) closeSettings(); };
}

function onSettingSlider(input) {
  const key = input.dataset.key;
  const step = parseFloat(input.dataset.step);
  const val = parseFloat(input.value);
  AppSettings[key] = val;
  try {
    const saved = JSON.parse(localStorage.getItem('resume-settings') || '{}');
    saved[key] = val;
    localStorage.setItem('resume-settings', JSON.stringify(saved));
  } catch(e){}
  const disp = step < 0.01 ? val.toFixed(3) : step < 0.1 ? val.toFixed(2) : step < 1 ? val.toFixed(1) : String(Math.round(val));
  const lbl = document.getElementById('sv-' + key);
  if (lbl) lbl.textContent = disp;
}

function closeSettings() {
  document.getElementById('settings-modal').style.display = 'none';
}

function resetAllSettings() {
  Object.assign(AppSettings, SETTINGS_DEFAULTS);
  try { localStorage.removeItem('resume-settings'); } catch(e){}
  openSettings();
}

// ── RANDOM THEME ──────────────────────────────────────────────────────────
function randomTheme() {
  const others = THEME_ORDER.filter(t => t !== currentTheme);
  const pick = others[Math.floor(Math.random() * others.length)];
  setTheme(pick);
  document.getElementById('theme-picker').value = pick;
  const tm = document.getElementById('theme-picker-mobile');
  if (tm) tm.value = pick;
  const btn = document.getElementById('random-theme-btn');
  if (btn) { btn.style.transform = 'rotate(720deg) scale(1.2)'; setTimeout(() => btn.style.transform = '', 500); }
}

  openSettings, closeSettings, resetAllSettings, onSettingSlider,
  cycleTagLevel, randomTheme,
});

})(); // end ResumeApp
